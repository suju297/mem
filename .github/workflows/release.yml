name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        shell: bash
        run: |
          set -eo pipefail
          go version
          VERSION="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"
          COMMIT="$(printf '%s' "${GITHUB_SHA:-dev}" | cut -c1-7)"
          DIST_DIR="dist/${VERSION}"
          PKG_DIR="${DIST_DIR}/mem_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${PKG_DIR}"

          BIN_NAME="mem"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN_NAME="mem.exe"
          fi

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath \
              -ldflags "-s -w -X mem/internal/app.Version=${VERSION} -X mem/internal/app.Commit=${COMMIT}" \
              -o "${PKG_DIR}/${BIN_NAME}" ./cmd/mem

          if [[ -f "ReadMe.md" ]]; then
            cp "ReadMe.md" "${PKG_DIR}/README.md"
          fi
          if [[ -f "LICENSE" ]]; then
            cp "LICENSE" "${PKG_DIR}/LICENSE"
          fi

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "${PKG_DIR}" && zip -q -r "../mem_${{ matrix.goos }}_${{ matrix.goarch }}.zip" .)
          else
            tar -czf "${DIST_DIR}/mem_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C "${PKG_DIR}" .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: mem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ github.ref_name }}/mem_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mem-*
          path: dist/${{ github.ref_name }}
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"
          cd "dist/${VERSION}"
          sha256sum mem_* > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/${{ github.ref_name }}/mem_*.tar.gz
            dist/${{ github.ref_name }}/mem_*.zip
            dist/${{ github.ref_name }}/checksums.txt

  homebrew_tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      HOMEBREW_TAP_REPO: suju297/homebrew-mem
    steps:
      - name: Skip when tap token is not configured
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; skipping Homebrew tap update."

      - name: Checkout source
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Render Homebrew formula
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"
          COMMIT="$(printf '%s' "${GITHUB_SHA:-dev}" | cut -c1-7)"
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${VERSION}.tar.gz"

          curl -fsSL "${TARBALL_URL}" -o /tmp/mem-homebrew-src.tar.gz
          SHA256="$(sha256sum /tmp/mem-homebrew-src.tar.gz | awk '{print $1}')"

          ./scripts/render_homebrew_formula.sh \
            --version "${VERSION}" \
            --commit "${COMMIT}" \
            --sha256 "${SHA256}" \
            --output "homebrew-tap/Formula/mem-cli.rb" \
            --readme "homebrew-tap/README.md"

      - name: Commit and push tap update
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -eo pipefail
          VERSION="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mem-cli.rb README.md

          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to commit."
            exit 0
          fi

          git commit -m "Update mem-cli formula for ${VERSION}"
          git push origin HEAD:main
