name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test (all packages)
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go race tests (internal packages)
        run: go test -race ./internal/...

  extension:
    name: VS Code extension checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode-mem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extensions/vscode-mem/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run extension tests
        run: npm test
